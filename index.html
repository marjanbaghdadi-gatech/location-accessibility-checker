<!DOCTYPE html>
<html>
<head>
  <title>Location Accessibility Checker</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#eef2f7;
      padding:40px;
      text-align:center;
    }

    .container{
      background:white;
      max-width:800px;
      margin:auto;
      padding:40px;
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
    }

    p{
      color:#555;
      margin-bottom:24px;
    }

    input[type="file"]{
      margin-bottom:20px;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      padding:12px 22px;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#1d4ed8;
    }

    .note{
      margin-top:20px;
      font-size:14px;
      color:#666;
    }

    iframe{
      width:100%;
      min-height:400px;
      border:1px solid #ddd;
      border-radius:10px;
      margin-top:30px;
      background:white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Location Accessibility Checker</h1>
    <p>Upload a photo of a location and get an accessibility report.</p>

    <form
      action="https://mbaghdadi6.app.n8n.cloud/webhook/accessibility-check"
      method="POST"
      enctype="multipart/form-data"
      target="resultFrame"
    >
      <input type="file" name="image" accept="image/*" required />
      <br><br>
      <button type="submit">Analyze Photo</button>
    </form>

    <div class="note">
      The report will appear below after submission.
    </div>

    <iframe name="resultFrame" title="Accessibility report"></iframe>
  </div>
</body>
</html>
